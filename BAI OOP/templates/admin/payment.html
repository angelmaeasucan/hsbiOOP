<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Form</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

body{
    margin:0;
    padding:0;
    display:flex;
    background:#f4f6f9;
    color:#333;
    font-family: Arial, sans-serif;
}

/* Sidebar */
.sidebar {
    width: 260px;
    background: #2c3e50;
    color: white;
    padding: 20px 15px;
    position: fixed;
    height: 100vh;
    overflow-y: auto;
}

.logo-title {
    text-align: center;
    margin-bottom: 20px;
    font-size: 18px;
    font-weight: bold;
}

.logo-title i {
    font-size: 28px;
    display: block;
    margin-bottom: 5px;
    color: #ecf0f1;
}

.sidebar a {
    display: flex;
    align-items: center;
    padding: 12px;
    margin: 5px 0;
    color: white;
    text-decoration: none;
    border-radius: 5px;
    transition: background 0.3s;
}

.sidebar a i {
    margin-right: 10px;
    width: 20px;
    text-align: center;
}

.sidebar a:hover {
    background: #34495e;
}

/* Main Content */
.main {
    flex: 1;
    margin-left: 260px;
    padding: 30px;
}

.header {
    display: flex;
    align-items: center;
    gap: 15px;
    margin-bottom: 30px;
}

.header i {
    font-size: 40px;
    color: #2563eb;
}

.header h1 {
    font-size: 36px;
    margin: 0;
}

.header p {
    color: #666;
    margin: 5px 0 0 0;
}

/* Container for form */
.form-container {
    max-width: 900px;
    margin: 0 auto;
}

.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}

.card {
    background: #fff;
    border-radius: 12px;
    border: 1px solid #ddd;
    overflow: hidden;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.card-header {
    padding: 18px 20px;
    border-bottom: 1px solid #ddd;
    display: flex;
    align-items: center;
    gap: 10px;
    color: #2563eb;
    font-size: 22px;
    font-weight: bold;
}

.card-body {
    padding: 20px;
}

.form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}

.form-group {
    display: flex;
    flex-direction: column;
}

.form-group label {
    margin-bottom: 8px;
    font-weight: bold;
}

.form-group input,
.form-group select,
.form-group textarea {
    padding: 14px;
    border: 1px solid #ccc;
    border-radius: 8px;
    font-size: 16px;
    outline: none;
    transition: border-color 0.3s;
}

.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus {
    border-color: #2563eb;
}

.form-group textarea {
    resize: none;
    height: 100px;
}

.stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 20px;
    margin-bottom: 20px;
}

.stat-box {
    background: #f8fafc;
    padding: 20px;
    border-radius: 10px;
    text-align: center;
    border: 1px solid #ddd;
}

.stat-box h3 {
    margin: 0 0 10px 0;
    font-size: 18px;
    color: #666;
}

.blue {
    color: #2563eb;
}

.green {
    color: #16a34a;
}

.red {
    color: #dc2626;
}

.amount {
    font-size: 36px;
    font-weight: bold;
}

.gc-box {
    background: #f8fafc;
    border: 1px solid #ddd;
    border-radius: 10px;
    padding: 20px;
    margin-top: 20px;
}

.gc-box h3 {
    color: #2563eb;
    margin-bottom: 20px;
    margin-top: 0;
}

.buttons {
    margin-top: 20px;
    background: #fff;
    padding: 20px;
    border-radius: 12px;
    border: 1px solid #ddd;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.btn {
    padding: 14px 28px;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    color: #fff;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: 0.3s;
}

.btn-gray {
    background: #e5e7eb;
    color: #333;
}

.btn-gray:hover {
    background: #d1d5db;
}

.btn-blue {
    background: #2563eb;
}

.btn-blue:hover {
    background: #1d4ed8;
}

.btn-green {
    background: #16a34a;
}

.btn-green:hover {
    background: #15803d;
}

.right-buttons {
    display: flex;
    gap: 15px;
}

@media(max-width:1200px){
    .grid {
        grid-template-columns: 1fr;
    }

    .form-grid {
        grid-template-columns: 1fr;
    }

    .stats {
        grid-template-columns: 1fr;
    }

    .buttons {
        flex-direction: column;
        gap: 20px;
    }

    .right-buttons {
        width: 100%;
        flex-direction: column;
    }

    .btn {
        width: 100%;
        justify-content: center;
    }
}

@media(max-width:768px){
    .sidebar {
        width: 0;
        overflow: hidden;
    }

    .main {
        margin-left: 0;
        padding: 15px;
    }

    .header {
        flex-direction: column;
        align-items: flex-start;
    }

    .header i {
        font-size: 30px;
    }

    .header h1 {
        font-size: 24px;
    }
}

</style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
    <div class="logo-title">
        <i class="fas fa-house"></i>
        <span>HomeTech</span>
    </div>

    <a href="{% if session.get('role') == 'cashier' %}{{ url_for('cashier_dashboard') }}{% else %}{{ url_for('admin_dashboard') }}{% endif %}"><i class="fas fa-chart-line"></i> Dashboard</a>
    <a href="{{ url_for('customer_management') }}"><i class="fas fa-users"></i> Customer</a>
    <a href="{{ url_for('products_management') }}"><i class="fas fa-box"></i> Products</a>
    <a href="{{ url_for('sales_management') }}"><i class="fas fa-shopping-cart"></i> Sales</a>
    <a href="{{ url_for('billing_management') }}"><i class="fas fa-file-invoice-dollar"></i> Billing</a>
    <a href="{{ url_for('payment_form') }}" class="active"><i class="fas fa-credit-card"></i> Payments</a>
    <a href="{{ url_for('reports') }}"><i class="fas fa-chart-pie"></i> Reports</a>
    <a href="{{ url_for('users') }}"><i class="fas fa-user-cog"></i> Users</a>
    <a href="{{ url_for('logout') }}"><i class="fas fa-sign-out-alt"></i> Logout</a>
</div>

<!-- Main Content -->
<div class="main">
    <!-- HEADER -->
    <div class="header">
        <i class="fa-solid fa-file-invoice-dollar"></i>
        <div>
            <h1>Payment Form</h1>
            <p>Record a customer payment</p>
        </div>
    </div>

    <div class="form-container">
        <div class="grid">
            <form action="/payment" method="POST">

            <!-- PAYMENT INFORMATION -->
            <div class="card">
                <div class="card-header">
                    <i class="fa-regular fa-credit-card"></i>
                    Payment Information
                </div>

                <div class="card-body">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Payment ID</label>
                            <input type="text" name="payment_id" value="PAY-2024-00001">
                        </div>

                        <div class="form-group">
                            <label>Date of Payment</label>
                            <input type="date" name="payment_date">
                        </div>

                        <div class="form-group">
                            <label>Customer</label>
                            <select name="customer">
                                <option value="">Select Customer</option>
                                {% for customer in customers %}
                                <option value="{{ customer.name }}">{{ customer.name }} ({{ customer.id }})</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Customer ID</label>
                            <input type="text" name="customer_id" placeholder="Auto-filled">
                        </div>

                        <div class="form-group">
                            <label>Invoice / Reference No.</label>
                            <input type="text" name="invoice_no" placeholder="INV-2024-00001">
                        </div>

                        <div class="form-group">
                            <label>Due Date</label>
                            <input type="date" name="due_date">
                        </div>
                    </div>
                </div>
            </div>

            <!-- PAYMENT METHOD -->
            <div class="card">
                <div class="card-header">
                    <i class="fa-solid fa-wallet"></i>
                    Payment Method
                </div>

                <div class="card-body">
                    <div class="form-group">
                        <label>Payment Type</label>
                        <select name="payment_type">
                            <option>Cash</option>
                            <option>Installment</option>
                            
                        </select>
                    </div>

                        <div class="form-group">
                            <label>Reference Number</label>
                            <input type="text" name="reference_number" placeholder="GN-1234567890">
                        </div>
                    </div>
                </div>
            </div>

            <!-- PAYMENT DETAILS -->
            <div class="card">
                <div class="card-header">
                    <i class="fa-regular fa-clipboard"></i>
                    Payment Details
                </div>

                <div class="card-body">
                    <div class="stats">
                        <div class="stat-box">
                            <h3>Total Amount Due</h3>
                            <div class="amount blue">₱ 5,000.00</div>
                        </div>

                        <div class="stat-box">
                            <h3>Amount Paid</h3>
                            <div class="amount green">₱ 2,000.00</div>
                        </div>

                        <div class="stat-box">
                            <h3>Remaining Balance</h3>
                            <div class="amount red">₱ 3,000.00</div>
                        </div>
                    </div>

                    <input type="hidden" name="total_due" value="5000">
                    <input type="hidden" name="remaining_balance" value="3000">

                    <div class="form-group" style="margin-bottom:20px;">
                        <label>Amount Paid</label>
                        <input type="number" name="amount_paid" value="2000">
                    </div>

                    <div class="form-group">
                        <label>Payment Status</label>
                        <select name="payment_status">
                            <option value="Partial">Partial</option>
                            <option value="Paid">Paid</option>
                            <option value="Pending">Pending</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- ADDITIONAL INFORMATION -->
            <div class="card">
                <div class="card-header">
                    <i class="fa-regular fa-note-sticky"></i>
                    Additional Information
                </div>

                <div class="card-body">
                    <div class="form-group" style="margin-bottom:20px;">
                        <label>Notes / Remarks</label>
                        <textarea name="remarks">Partial payment for invoice</textarea>
                    </div>

                    <div class="form-group">
                        <label>Processed By</label>
                        <input type="text" name="processed_by" value="{{ session.get('username', 'Cashier') }}" readonly>
                    </div>
                </div>
            </div>

            </form>
        </div>

        <!-- BUTTONS -->
        <div class="buttons">
            <button type="button" class="btn btn-gray" onclick="window.location.href='/payment'">
                <i class="fas fa-times"></i>
                Cancel
            </button>

            <div class="right-buttons">
                <button type="submit" class="btn btn-blue" onclick="document.querySelector('form').submit()">
                    <i class="fa-solid fa-paper-plane"></i>
                    Submit Payment
                </button>

                <button type="button" class="btn btn-green" onclick="window.print()">
                    <i class="fa-solid fa-print"></i>
                    Print Receipt
                </button>
            </div>
        </div>
    </div>

</div>

</body>
</html>
